<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waste Classification · Mobile Capture Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.20.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
<style>
  body{
    margin:0;
    background:#f6f4ee;
    color:#1f2b22;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap{
    max-width:680px;
    margin:0 auto;
    padding:32px 20px;
  }
  h1{
    font-size:24px;
    color:#2f5233;
  }
  button{
    font-size:14px;
    font-weight:600;
    padding:12px 14px;
    border-radius:9px;
    border:1px solid transparent;
    cursor:pointer;
    margin-right:10px;
  }
  .btn-primary{ background:#2f5233; color:#fff; }
  .btn-secondary{ background:transparent; color:#2f5233; border-color:#6b9071; }

  .stage-row{
    display:flex;
    gap:14px;
    margin-top:14px;
  }
  video, canvas{
    flex:1;
    min-width:0;
    border-radius:10px;
    display:block;
  }

  #status{ font-family: monospace; font-size:12px; color:#7a8a7c; margin-top:10px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Photo Capture &rarr; Recognition Pipeline Demo</h1>
    <p id="status">Loading recognition model…</p>

    <button class="btn-primary" id="startBtn">Start Camera</button>
    <button class="btn-secondary" id="shotBtn">Capture &amp; Classify</button>

    <div class="stage-row">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" width="400" height="300"></canvas>
    </div>

    <h2>Result:</h2>
    <p id="result">(no result yet)</p>
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const shotBtn = document.getElementById("shotBtn");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusText = document.getElementById("status");
    const resultText = document.getElementById("result");

    let model = null;

    mobilenet.load().then(function(loadedModel) {
      model = loadedModel;
      statusText.textContent = "Model ready — tap Start Camera to begin.";
    });

    startBtn.addEventListener("click", async function() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      video.srcObject = stream;
    });

    shotBtn.addEventListener("click", async function() {
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const predictions = await model.classify(canvas);
      resultText.textContent = predictions[0].className + " (confidence: " + (predictions[0].probability * 100).toFixed(1) + "%)";
    });
  </script>
</body>
</html>
